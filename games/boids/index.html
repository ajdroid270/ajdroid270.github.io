<!DOCTYPE html>
<html>

  <head>
    <meta charset="utf-8" />
    <title>Boids</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
      integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
  </head>

  <body>
    <div style="display: flex; justify-content: center;align-items: center; width: 100%;">
      <canvas id="boids" width="150" height="150"></canvas>
    </div>
    <div class="menuContainer">
      <button id="toggleTrails" type="button" class="btn btn-secondary">TRAILS</button>
      <div class="sliderContainer">
        <input class="form-control" type="range" name="visualRange" id="visualRangeSlider" min="0" max="200" value="75">
        <label for="visualRangeSlider" class="sliderLabel" id="visualRangeLabel">Visual Range</label>
      </div>
      <div class="sliderContainer">
        <input class="form-control" type="range" name="separation" id="separationSlider" min="0" max="50" value="20">
        <label for="separationSlider" class="sliderLabel" id="separationLabel">Separation</label>
      </div>
    </div>
    <script src="./boids.js"></script>
  </body>

</html>
